name: kafkax
description: "A full-featured Kafka desktop client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  riverpod_annotation: ^4.0.2
  flutter_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.3.1
  go_router: ^17.2.3
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  encrypt: ^5.0.3
  path_provider: ^2.1.5
  ffi: ^2.1.4
  logging: ^1.3.0
  uuid: ^4.5.1
  collection: ^1.19.1
  native_assets_cli: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4-dev.1
  build_runner: ^2.4.14
  ffigen: ^20.1.1
  test: ^1.25.15

flutter:
  uses-material-design: true
