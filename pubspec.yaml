name: kafkax
description: "A full-featured Kafka desktop client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  riverpod_annotation: ^4.0.2
  flutter_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.3.1
  go_router: ^17.2.3
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  encrypt: ^5.0.3
  path_provider: ^2.1.5
  ffi: ^2.1.4
  logging: ^1.3.0
  uuid: ^4.5.1
  collection: ^1.19.1
  hooks: ^2.0.0
  code_assets: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4-dev.1
  build_runner: ^2.4.14
  ffigen: ^20.1.1
  test: ^1.25.15

flutter:
  uses-material-design: true

ffigen:
  name: LibRdKafka
  description: Bindings to librdkafka
  output: 'lib/ffi/bindings/rd_kafka.dart'
  ffi-native:
    asset-id: 'package:kafkax/kafkax_ffi.dart'
  silence-enum-warning: true
  llvm-path:
    - '/home/ryujane/.local/llvm'
  headers:
    entry-points:
      - 'third_party/librdkafka/include/rdkafka.h'
    include-directives:
      - '**rdkafka.h'
  compiler-opts:
    - '-Ithird_party/librdkafka/include'
    - '-I/usr/lib/gcc/x86_64-linux-gnu/15/include'
  functions:
    include:
      - 'rd_kafka_new'
      - 'rd_kafka_destroy'
      - 'rd_kafka_name'
      - 'rd_kafka_type'
      - 'rd_kafka_poll'
      - 'rd_kafka_flush'
      - 'rd_kafka_brokers_add'
      - 'rd_kafka_errno2err'
      - 'rd_kafka_errno'
      - 'rd_kafka_fatal_error'
      - 'rd_kafka_err2str'
      - 'rd_kafka_err2name'
      - 'rd_kafka_last_error'
      - 'rd_kafka_consumer_close'
      - 'rd_kafka_subscribe'
      - 'rd_kafka_unsubscribe'
      - 'rd_kafka_consume_start'
      - 'rd_kafka_consume_stop'
      - 'rd_kafka_consume'
      - 'rd_kafka_consume_batch'
      - 'rd_kafka_produce'
      - 'rd_kafka_producev'
      - 'rd_kafka_message_destroy'
      - 'rd_kafka_topic_new'
      - 'rd_kafka_topic_destroy'
      - 'rd_kafka_topic_name'
      - 'rd_kafka_topic_partition_destroy'
      - 'rd_kafka_conf_new'
      - 'rd_kafka_conf_destroy'
      - 'rd_kafka_conf_set'
      - 'rd_kafka_conf_set_log_cb'
      - 'rd_kafka_conf_set_stats_cb'
      - 'rd_kafka_conf_set_dr_msg_cb'
      - 'rd_kafka_conf_set_error_cb'
      - 'rd_kafka_conf_set_default_topic_conf'
      - 'rd_kafka_topic_conf_new'
      - 'rd_kafka_topic_conf_destroy'
      - 'rd_kafka_topic_conf_set'
      - 'rd_kafka_metadata'
      - 'rd_kafka_metadata_destroy'
      - 'rd_kafka_list_groups'
      - 'rd_kafka_describe_groups'
      - 'rd_kafka_CreateTopics'
      - 'rd_kafka_DeleteTopics'
      - 'rd_kafka_AlterConfigs'
      - 'rd_kafka_DescribeConfigs'
      - 'rd_kafka_event_error'
      - 'rd_kafka_event_error_string'
      - 'rd_kafka_event_destroy'
      - 'rd_kafka_queue_poll'
      - 'rd_kafka_queue_destroy'
  structs:
    include:
      - 'rd_kafka_message_s'
      - 'rd_kafka_topic_partition_s'
      - 'rd_kafka_metadata_broker_s'
      - 'rd_kafka_metadata_topic_s'
      - 'rd_kafka_metadata_partition_s'
      - 'rd_kafka_metadata_s'
      - 'rd_kafka_group_member_info_s'
      - 'rd_kafka_group_info_s'
      - 'rd_kafka_topic_result_s'
      - 'rd_kafka_queue_s'
  enums:
    include:
      - 'rd_kafka_type_t'
      - 'rd_kafka_resp_err_t'
      - 'rd_kafka_timestamp_type_t'
  unnamed-enums:
    include:
      - '.*'
  globals:
    exclude:
      - '.*'
  macros:
    include:
      - 'RD_KAFKA_VERSION'
      - 'RD_KAFKA_DEBUG_CONTEXTS'
      - 'RD_KAFKA_PARTITION_UA'
      - 'RD_KAFKA_OFFSET_BEGINNING'
      - 'RD_KAFKA_OFFSET_END'
      - 'RD_KAFKA_OFFSET_STORED'
      - 'RD_KAFKA_OFFSET_INVALID'
      - 'RD_KAFKA_OFFSET_TAIL_BASE'
